# CutMakers — produção (staging público em cutmakers.derek.dev.br)
#
# Sem banco: usamos Supabase (Postgres gerenciado externo).
# Ambos os serviços entram na rede externa compartilhada `web` para que o
# Caddy central (em ~/infra/) alcance-os pelo nome do container.
#
# Rode a partir da RAIZ do repositório:
#   docker compose build
#   docker compose up -d
name: cutmakers

services:
  cutmakers-api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    image: cutmakers-api:latest
    container_name: cutmakers-api
    restart: unless-stopped
    # Segredos e config de runtime vêm deste arquivo (criado no servidor, NÃO commitado)
    env_file:
      - ./packages/api/.env.production
    environment:
      NODE_ENV: production
      PORT: "3333"
    networks:
      - web
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cutmakers-web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        # VITE_* são assados em build time. O app usa '/api' relativo por padrão.
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: cutmakers-web:latest
    container_name: cutmakers-web
    restart: unless-stopped
    depends_on:
      - cutmakers-api
    networks:
      - web

networks:
  web:
    external: true
