# Serve o SPA do CutMakers. As chamadas /api/* NÃO passam por aqui —
# o Caddy (reverse proxy) roteia /api/* direto para o container da API.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash no nome → cache longo e imutável
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback do SPA (react-router): qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
